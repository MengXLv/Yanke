server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 200
    max-connections: 10000
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/yangke_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 10
      connection-init-sql: SET NAMES utf8mb4
    # 从库（只读副本，生产环境指向独立 MySQL 实例即可启用读写分离）
    slave:
      url: jdbc:mysql://localhost:3306/yangke_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 100
        minimum-idle: 10
        connection-init-sql: SET NAMES utf8mb4

  redis:
    host: localhost
    port: 6379
    password:
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: 1
    consumer:
      group-id: forum-notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.yangke.forum.module.notification.entity
      enable-auto-commit: false

  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-auth-code
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  elasticsearch:
    rest:
      uris: http://localhost:9200
      username:
      password:

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.yangke.forum.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

forum:
  dev-mode: true          # true=注册即激活（跳过邮件）
  read-write-split: true  # 开启读写分离（AbstractRoutingDataSource + AOP）
  captcha:
    expire-seconds: 120
  activation:
    expire-hours: 24
  cache:
    caffeine:
      post-expire-seconds: 300
      hot-posts-expire-seconds: 60
    redis:
      post-expire-seconds: 1800
      user-expire-seconds: 3600
  statistics:
    uv-prefix: "uv:"        # HyperLogLog
    dau-prefix: "dau:"      # Bitmap
    daily-active-prefix: "daily_active:"
  hot:
    threshold: 3            # 点赞数阈值标记热帖
    refresh-ms: 300000      # 热帖刷新周期(毫秒, 默认5分钟)
    fallback-count: 10      # 不足时取最新帖子兜底
  upload:
    avatar-dir: ./uploads/avatar
    avatar-url-prefix: /avatar/
